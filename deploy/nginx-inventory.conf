# 进销存管理系统 - Nginx 配置
# 将此文件放到服务器 /etc/nginx/conf.d/ 目录下，然后 nginx -s reload
#
# 部署说明：
# - 后端 API：PM2 运行在本机 3001 端口
# - MySQL：Docker 容器运行，映射到 127.0.0.1:3307

server {
    listen 80;
    server_name inventory.lawapp.top;

    # 前端静态文件
    root /home/myproject/inventory-system/web/dist;
    index index.html;

    # 前端路由 - SPA 支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 PM2 后端（包含上传接口和图片访问）
    # ^~ 前缀匹配优先级高于正则匹配，确保 /api/uploads/xxx.jpg 不会被静态缓存规则拦截
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    # 上传文件反向代理
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
