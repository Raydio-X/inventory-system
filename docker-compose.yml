version: '3.8'

services:
  # ========== MySQL 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: inv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme123}
      MYSQL_DATABASE: inventory_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - inv-mysql-data:/var/lib/mysql
      - ./docker-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    networks:
      - inv-network
    # 仅暴露给内部网络，不映射到宿主机
    expose:
      - "3306"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 后端 API ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inv-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      NODE_ENV: production
    volumes:
      - inv-uploads:/app/uploads
    networks:
      - inv-network
    # 仅暴露给内部网络，不映射到宿主机
    expose:
      - "3001"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ========== 前端 Nginx ==========
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: inv-frontend
    restart: unless-stopped
    networks:
      - inv-network
    # 唯一对外暴露的端口，映射到宿主机
    ports:
      - "${HOST_PORT:-8800}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

# ========== 数据卷 ==========
volumes:
  inv-mysql-data:
    driver: local
  inv-uploads:
    driver: local

# ========== 独立桥接网络 ==========
networks:
  inv-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
