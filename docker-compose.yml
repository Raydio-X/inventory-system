version: '3.8'

services:
  # ========== MySQL 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: inv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 338296
      MYSQL_DATABASE: inventory_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - inv-mysql-data:/var/lib/mysql
      - ./docker-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    # 对外暴露端口（3307 避免与已有数据库 3306 冲突）
    ports:
      - "3307:3306"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

# ========== 数据卷 ==========
volumes:
  inv-mysql-data:
    driver: local
